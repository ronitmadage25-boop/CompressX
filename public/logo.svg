<svg viewBox="0 0 512 512" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <radialGradient id="glow" cx="50%" cy="50%" r="50%">
      <stop offset="0%" style="stop-color:#00ffb3;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#00b8ff;stop-opacity:0.3" />
    </radialGradient>
    <filter id="shadow">
      <feGaussianBlur in="SourceAlpha" stdDeviation="3"/>
      <feOffset dx="0" dy="4" result="offsetblur"/>
      <feComponentTransfer>
        <feFuncA type="linear" slope="0.5"/>
      </feComponentTransfer>
      <feMerge>
        <feMergeNode/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>
  
  <!-- Background circle -->
  <circle cx="256" cy="256" r="240" fill="url(#glow)" opacity="0.2"/>
  
  <!-- Outer ring -->
  <circle cx="256" cy="256" r="240" fill="none" stroke="#00ffb3" stroke-width="8" opacity="0.6"/>
  
  <!-- Inner glow -->
  <circle cx="256" cy="256" r="220" fill="none" stroke="#00ffb3" stroke-width="2" opacity="0.3"/>
  
  <!-- CX Logo -->
  <g filter="url(#shadow)">
    <!-- C -->
    <path d="M 180 180 Q 140 220 140 256 Q 140 292 180 332" 
          fill="none" stroke="#00ffb3" stroke-width="24" stroke-linecap="round"/>
    
    <!-- X -->
    <line x1="280" y1="160" x2="380" y2="352" stroke="#00ffb3" stroke-width="24" stroke-linecap="round"/>
    <line x1="380" y1="160" x2="280" y2="352" stroke="#00ffb3" stroke-width="24" stroke-linecap="round"/>
  </g>
  
  <!-- Accent dots -->
  <circle cx="100" cy="100" r="8" fill="#00ffb3" opacity="0.6"/>
  <circle cx="412" cy="120" r="6" fill="#00ffb3" opacity="0.4"/>
  <circle cx="420" cy="400" r="7" fill="#00ffb3" opacity="0.5"/>
  <circle cx="90" cy="420" r="5" fill="#00ffb3" opacity="0.3"/>
</svg>
