<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Generate PWA Icons</title>
  <style>
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      max-width: 800px;
      margin: 40px auto;
      padding: 20px;
      background: #020407;
      color: #e8eaf0;
    }
    h1 { color: #00ffb3; }
    .instructions {
      background: rgba(0,255,179,0.1);
      border: 1px solid rgba(0,255,179,0.3);
      padding: 20px;
      border-radius: 8px;
      margin: 20px 0;
    }
    canvas {
      border: 1px solid rgba(255,255,255,0.2);
      margin: 10px 0;
      display: block;
    }
    button {
      background: linear-gradient(135deg, #00ffb3, #00b8ff);
      color: #020407;
      border: none;
      padding: 10px 20px;
      border-radius: 6px;
      cursor: pointer;
      font-weight: 600;
      margin: 10px 5px 10px 0;
    }
    button:hover {
      opacity: 0.9;
    }
    .success {
      color: #00ffb3;
      margin: 10px 0;
    }
  </style>
</head>
<body>
  <h1>🎨 CompressX PWA Icon Generator</h1>
  
  <div class="instructions">
    <h2>Instructions:</h2>
    <ol>
      <li>Click "Generate Icons" below</li>
      <li>Right-click each canvas and select "Save image as..."</li>
      <li>Save with the exact filename shown</li>
      <li>Place all files in the <code>public/</code> folder</li>
    </ol>
  </div>

  <div>
    <h3>192x192 Icon</h3>
    <canvas id="canvas192" width="192" height="192"></canvas>
    <button onclick="downloadCanvas('canvas192', 'logo-192.png')">Download 192x192</button>
    <button onclick="downloadCanvas('canvas192', 'logo-192-maskable.png')">Download 192x192 Maskable</button>
  </div>

  <div>
    <h3>512x512 Icon</h3>
    <canvas id="canvas512" width="512" height="512"></canvas>
    <button onclick="downloadCanvas('canvas512', 'logo-512.png')">Download 512x512</button>
    <button onclick="downloadCanvas('canvas512', 'logo-512-maskable.png')">Download 512x512 Maskable</button>
  </div>

  <script>
    function drawIcon(canvasId) {
      const canvas = document.getElementById(canvasId);
      const ctx = canvas.getContext('2d');
      const size = canvas.width;
      const center = size / 2;
      const radius = size * 0.35;

      // Background
      ctx.fillStyle = '#020407';
      ctx.fillRect(0, 0, size, size);

      // Outer glow circle
      const gradient = ctx.createRadialGradient(center, center, 0, center, center, radius * 1.2);
      gradient.addColorStop(0, 'rgba(0, 255, 179, 0.3)');
      gradient.addColorStop(1, 'rgba(0, 184, 255, 0.1)');
      ctx.fillStyle = gradient;
      ctx.beginPath();
      ctx.arc(center, center, radius * 1.2, 0, Math.PI * 2);
      ctx.fill();

      // Outer ring
      ctx.strokeStyle = '#00ffb3';
      ctx.lineWidth = size * 0.04;
      ctx.beginPath();
      ctx.arc(center, center, radius, 0, Math.PI * 2);
      ctx.stroke();

      // Inner ring
      ctx.strokeStyle = 'rgba(0, 255, 179, 0.4)';
      ctx.lineWidth = size * 0.01;
      ctx.beginPath();
      ctx.arc(center, center, radius * 0.95, 0, Math.PI * 2);
      ctx.stroke();

      // Draw CX logo
      ctx.strokeStyle = '#00ffb3';
      ctx.lineWidth = size * 0.08;
      ctx.lineCap = 'round';
      ctx.lineJoin = 'round';

      // C
      ctx.beginPath();
      ctx.arc(center - radius * 0.3, center, radius * 0.35, Math.PI * 0.3, Math.PI * 1.7, false);
      ctx.stroke();

      // X
      const xOffset = radius * 0.3;
      const xSize = radius * 0.25;
      ctx.beginPath();
      ctx.moveTo(center + xOffset - xSize, center - xSize);
      ctx.lineTo(center + xOffset + xSize, center + xSize);
      ctx.stroke();

      ctx.beginPath();
      ctx.moveTo(center + xOffset + xSize, center - xSize);
      ctx.lineTo(center + xOffset - xSize, center + xSize);
      ctx.stroke();

      // Accent dots
      ctx.fillStyle = '#00ffb3';
      ctx.beginPath();
      ctx.arc(center - radius * 1.3, center - radius * 1.3, size * 0.02, 0, Math.PI * 2);
      ctx.fill();

      ctx.beginPath();
      ctx.arc(center + radius * 1.4, center - radius * 1.2, size * 0.015, 0, Math.PI * 2);
      ctx.fill();
    }

    function downloadCanvas(canvasId, filename) {
      const canvas = document.getElementById(canvasId);
      const link = document.createElement('a');
      link.href = canvas.toDataURL('image/png');
      link.download = filename;
      link.click();
    }

    // Generate icons on load
    window.addEventListener('load', () => {
      drawIcon('canvas192');
      drawIcon('canvas512');
      console.log('✅ Icons generated! Right-click to save.');
    });
  </script>
</body>
</html>
